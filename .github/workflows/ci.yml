name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run test suite
        run: pytest -q

      - name: Smoke-run demos
        run: |
          python examples/engineering_design_demo.py > /dev/null
          python examples/research_paper_demo.py > /dev/null
          python examples/evolution_demo.py > /dev/null
          python examples/child_development_demo.py > /dev/null
          python examples/llm_extraction_demo.py > /dev/null

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Show artifacts
        run: ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
